name: CI/CD Pipeline com CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite rodar manualmente

jobs:
  # JOB 1: Análise de Segurança
  codeql-analysis:
    name: '🔒 Análise CodeQL'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          config-file: ./ .github/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # JOB 2: Testes Automatizados (Só roda se o Job 1 passar)
  tests:
    name: '🧪 Testes Automatizados'
    needs: codeql-analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flake8 (Lint)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Pytest
        run: pytest

  # JOB 3: Deploy para Stage (Só roda se 1 e 2 passarem)
  deploy-stage:
    name: '🚀 Deploy para Stage'
    needs: [codeql-analysis, tests]
    environment: stage
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Simulation
        run: |
          echo "Efetuando deploy no ambiente de homologação (stage)..."
          echo "Status: Sucesso!